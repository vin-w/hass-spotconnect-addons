name: SpotConnect
version: "1.0.1"
slug: spotconnect
description: >-
  Expose AirPlay and UPnP devices as Spotify Connect speakers.
  Use raop mode for HomePods, upnp for Sonos/UPnP devices.
url: https://github.com/vin-w/hass-spotconnect-addons
changelog: https://github.com/vin-w/hass-spotconnect-addons/releases
arch:
  - armv7
  - armhf
  - aarch64
  - amd64
  - i386
host_network: true
map:
  - share:rw
options:
  mode: raop
  puid: 1000
  pgid: 1000
  vorbis_bitrate: 320
  store_cred_xml: false
  log_level_raop: info
schema:
  mode: list(raop|upnp)
  puid: int
  pgid: int
  vorbis_bitrate: list(96|160|320)
  store_cred_xml: bool
  log_level_raop: list(error|warn|info|debug|sdebug)
